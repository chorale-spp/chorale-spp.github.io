title: "Chorale Saint Padre Pio"
tagline: "Where voices become one"
description: "Official portal for Chorale Saint Padre Pio — scores, news, gallery, and vocal tips."
baseurl: "/chorale-spp.github.io"
url: "https://chorale-spp.github.io"

theme: minima


# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:categories/:title/

# Collections
collections:
  posts:
    output: true
    permalink: /vocal-tips/:title/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Chorale Saint Padre Pio"

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-remote-theme


# Sass
sass:
  style: compressed

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
